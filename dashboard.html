<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Dashboard — Hotel Vinayagam</title>
    <link rel="stylesheet" href="styles.css" />
    <style>
      body {
        background: var(--soft);
      }

      .dash-header {
        background: linear-gradient(135deg, #08271f, #0b3d30);
        color: #fff;
        padding: 24px;
      }

      .dash-header .nav {
        max-width: 1180px;
        margin: 0 auto;
      }

      .dash-header .nav-actions {
        gap: 12px;
      }

      .dash-header .nav-actions a {
        color: #fff;
        text-decoration: none;
        font-size: 0.88rem;
        font-weight: 600;
        opacity: 0.8;
        transition: opacity 150ms;
      }

      .dash-header .nav-actions a:hover {
        opacity: 1;
      }

      .btn-logout {
        border: 1px solid rgba(255, 255, 255, 0.35);
        border-radius: 8px;
        background: rgba(255, 255, 255, 0.15);
        color: #fff;
        padding: 8px 14px;
        font-size: 0.84rem;
        font-weight: 800;
        cursor: pointer;
        transition: background 150ms;
      }

      .btn-logout:hover {
        background: rgba(255, 255, 255, 0.25);
      }

      .dash-container {
        max-width: 1180px;
        margin: 0 auto;
        padding: 24px;
      }

      .dash-toolbar {
        display: flex;
        align-items: center;
        justify-content: space-between;
        flex-wrap: wrap;
        gap: 14px;
        margin-bottom: 24px;
      }

      .dash-toolbar h1 {
        font-size: 1.5rem;
        margin: 0;
      }

      .month-nav {
        display: flex;
        align-items: center;
        gap: 8px;
      }

      .month-nav button {
        display: inline-grid;
        place-items: center;
        width: 36px;
        height: 36px;
        border: 1px solid var(--line);
        border-radius: 8px;
        background: var(--surface);
        color: var(--ink);
        font-size: 1.1rem;
        font-weight: 700;
        transition: background 150ms;
      }

      .month-nav button:hover {
        background: var(--soft);
      }

      .month-nav .month-label {
        min-width: 180px;
        text-align: center;
        font-size: 1.15rem;
        font-weight: 800;
      }

      .btn-today {
        border: 1px solid var(--accent);
        border-radius: 8px;
        background: var(--surface);
        color: var(--accent-dark);
        padding: 8px 16px;
        font-size: 0.85rem;
        font-weight: 800;
        transition: background 150ms;
      }

      .btn-today:hover {
        background: #e8f6f0;
      }

      .legend {
        display: flex;
        flex-wrap: wrap;
        gap: 14px;
        margin-bottom: 20px;
      }

      .legend-item {
        display: flex;
        align-items: center;
        gap: 6px;
        font-size: 0.82rem;
        font-weight: 600;
        color: var(--muted);
      }

      .legend-dot {
        width: 12px;
        height: 12px;
        border-radius: 3px;
      }

      .calendar-card {
        border: 1px solid var(--line);
        border-radius: 8px;
        background: var(--surface);
        box-shadow: 0 12px 24px rgba(24, 32, 29, 0.07);
        overflow: hidden;
      }

      .cal-head {
        display: grid;
        grid-template-columns: repeat(7, 1fr);
        background: var(--soft);
        border-bottom: 1px solid var(--line);
      }

      .cal-head span {
        padding: 10px 8px;
        text-align: center;
        font-size: 0.75rem;
        font-weight: 800;
        text-transform: uppercase;
        color: var(--muted);
        letter-spacing: 0.04em;
      }

      .cal-grid {
        display: grid;
        grid-template-columns: repeat(7, 1fr);
      }

      .cal-cell {
        min-height: 100px;
        border-right: 1px solid var(--line);
        border-bottom: 1px solid var(--line);
        padding: 4px;
        position: relative;
        overflow: hidden;
        cursor: pointer;
      }

      .cal-cell:hover {
        background: #f0faf5;
      }

      .cal-cell:nth-child(7n) {
        border-right: none;
      }

      .cal-cell.outside {
        background: var(--soft);
        opacity: 0.5;
      }

      .cal-cell.today {
        background: #f0faf5;
      }

      .cal-day {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        width: 26px;
        height: 26px;
        border-radius: 50%;
        font-size: 0.82rem;
        font-weight: 700;
        color: var(--ink);
        margin-bottom: 2px;
      }

      .cal-cell.today .cal-day {
        background: var(--accent);
        color: #fff;
      }

      .cal-booking {
        display: block;
        padding: 2px 5px;
        margin-bottom: 2px;
        border-radius: 4px;
        font-size: 0.68rem;
        font-weight: 700;
        line-height: 1.4;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
        cursor: default;
      }

      .cal-booking.status-confirmed {
        background: #d4edda;
        color: #155724;
      }

      .cal-booking.status-checked-in {
        background: #cce5ff;
        color: #004085;
      }

      .cal-booking.status-completed {
        background: #e2e3e5;
        color: #383d41;
      }

      .cal-booking.status-cancelled {
        background: #f8d7da;
        color: #721c24;
      }

      .cal-booking.status-pending {
        background: #fff3cd;
        color: #856404;
      }

      .cal-more {
        font-size: 0.65rem;
        color: var(--accent);
        font-weight: 800;
        padding: 0 5px;
        cursor: pointer;
      }

      .cal-more:hover {
        text-decoration: underline;
      }

      .stats-row {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
        gap: 14px;
        margin-bottom: 24px;
      }

      .stat-card {
        border: 1px solid var(--line);
        border-radius: 8px;
        background: var(--surface);
        padding: 16px;
        box-shadow: 0 4px 12px rgba(24, 32, 29, 0.04);
      }

      .stat-card .stat-label {
        font-size: 0.75rem;
        font-weight: 800;
        text-transform: uppercase;
        color: var(--muted);
        margin: 0 0 6px;
      }

      .stat-card .stat-value {
        font-size: 1.6rem;
        font-weight: 900;
        color: var(--ink);
        margin: 0;
      }

      .popup-overlay {
        display: none;
        position: fixed;
        inset: 0;
        background: rgba(0, 0, 0, 0.35);
        z-index: 100;
        place-items: center;
      }

      .popup-overlay.open {
        display: grid;
      }

      .popup {
        background: var(--surface);
        border-radius: 12px;
        box-shadow: 0 24px 60px rgba(0, 0, 0, 0.2);
        padding: 24px;
        min-width: 320px;
        max-width: 460px;
        max-height: 80vh;
        overflow-y: auto;
      }

      .popup h3 {
        margin: 0 0 16px;
        font-size: 1.1rem;
      }

      .popup-booking {
        padding: 10px 0;
        border-bottom: 1px solid var(--line);
      }

      .popup-booking:last-child {
        border-bottom: none;
      }

      .popup-booking .popup-guest {
        font-weight: 800;
        font-size: 0.92rem;
      }

      .popup-booking .popup-meta {
        color: var(--muted);
        font-size: 0.82rem;
        margin-top: 2px;
      }

      .popup-close {
        margin-top: 16px;
        width: 100%;
        min-height: 40px;
        border: 1px solid var(--line);
        border-radius: 8px;
        background: var(--soft);
        font-weight: 700;
        cursor: pointer;
      }

      .popup-actions {
        display: flex;
        flex-wrap: wrap;
        gap: 6px;
        margin-top: 8px;
      }

      .popup-actions button {
        border: 1px solid var(--line);
        border-radius: 8px;
        background: var(--surface);
        color: var(--ink);
        padding: 5px 10px;
        font-size: 0.75rem;
        font-weight: 700;
        cursor: pointer;
        transition: all 150ms;
      }

      .popup-actions button:hover {
        background: var(--soft);
      }

      .popup-actions button.active-status {
        border-color: var(--accent);
        background: #e8f6f0;
        color: var(--accent-dark);
        cursor: default;
        opacity: 0.7;
      }

      .popup-actions button.status-cancelled-btn:hover {
        background: #f8d7da;
        border-color: #f5c6cb;
        color: #721c24;
      }

      .loading-msg {
        text-align: center;
        padding: 60px 20px;
        color: var(--muted);
        font-size: 0.95rem;
      }

      .error-msg {
        text-align: center;
        padding: 40px 20px;
        color: #721c24;
        background: #f8d7da;
        border-radius: 8px;
        margin-bottom: 20px;
        font-size: 0.92rem;
      }

      .room-filter {
        display: flex;
        gap: 6px;
        flex-wrap: wrap;
      }

      .room-filter button {
        border: 1px solid var(--line);
        border-radius: 8px;
        background: var(--surface);
        color: var(--ink);
        padding: 6px 12px;
        font-size: 0.8rem;
        font-weight: 700;
        transition: all 150ms;
      }

      .room-filter button.active {
        border-color: var(--accent);
        background: #e8f6f0;
        color: var(--accent-dark);
      }

      @media (max-width: 760px) {
        .cal-cell {
          min-height: 70px;
          padding: 2px;
        }

        .cal-booking {
          font-size: 0.6rem;
          padding: 1px 3px;
        }

        .month-nav .month-label {
          min-width: 140px;
          font-size: 1rem;
        }

        .dash-toolbar {
          flex-direction: column;
          align-items: flex-start;
        }

        .stats-row {
          grid-template-columns: repeat(2, 1fr);
        }
      }
    </style>
  </head>
  <body>
    <header class="dash-header">
      <nav class="nav">
        <a class="brand" href="index.html" aria-label="Hotel Vinayagam home">
          <span class="brand-mark">V</span>
          <span>Hotel Vinayagam</span>
        </a>
        <div class="nav-actions">
          <a href="index.html">Bookings</a>
          <span class="nav-pill">Dashboard</span>
          <button id="btnLogout" type="button" class="btn-logout">Logout</button>
        </div>
      </nav>
    </header>

    <div class="dash-container">
      <div class="dash-toolbar">
        <h1>Booking Calendar</h1>
        <div style="display:flex; align-items:center; gap:12px; flex-wrap:wrap;">
          <div class="room-filter" id="roomFilter">
            <button class="active" data-room="all">All rooms</button>
            <button data-room="mini-standard">Mini Standard</button>
            <button data-room="standard">Standard</button>
            <button data-room="deluxe">Deluxe</button>
            <button data-room="family">Family</button>
          </div>
          <button class="btn-today" id="btnToday" type="button">Today</button>
        </div>
      </div>

      <div id="statsRow" class="stats-row"></div>

      <div class="legend">
        <div class="legend-item"><span class="legend-dot" style="background:#d4edda;border:1px solid #a3d9b1;"></span> Confirmed</div>
        <div class="legend-item"><span class="legend-dot" style="background:#fff3cd;border:1px solid #f0dfa0;"></span> Pending</div>
        <div class="legend-item"><span class="legend-dot" style="background:#cce5ff;border:1px solid #9ec5fe;"></span> Checked in</div>
        <div class="legend-item"><span class="legend-dot" style="background:#e2e3e5;border:1px solid #c6c8ca;"></span> Completed</div>
        <div class="legend-item"><span class="legend-dot" style="background:#f8d7da;border:1px solid #f1aeb5;"></span> Cancelled</div>
      </div>

      <div class="calendar-card">
        <div style="display:flex;align-items:center;justify-content:space-between;padding:14px 16px;border-bottom:1px solid var(--line);">
          <div class="month-nav">
            <button id="btnPrev" type="button" title="Previous month">&#8249;</button>
            <span class="month-label" id="monthLabel"></span>
            <button id="btnNext" type="button" title="Next month">&#8250;</button>
          </div>
        </div>
        <div class="cal-head">
          <span>Sun</span><span>Mon</span><span>Tue</span><span>Wed</span><span>Thu</span><span>Fri</span><span>Sat</span>
        </div>
        <div class="cal-grid" id="calGrid">
          <div class="loading-msg" style="grid-column:1/-1;">Loading bookings...</div>
        </div>
      </div>
    </div>

    <div class="popup-overlay" id="popupOverlay">
      <div class="popup">
        <h3 id="popupTitle"></h3>
        <div id="popupBody"></div>
        <button class="popup-close" id="popupClose" type="button">Close</button>
      </div>
    </div>

    <script>
      (async function checkAuth() {
        const token = sessionStorage.getItem("adminToken");
        if (!token) {
          window.location.href = "login.html";
          return;
        }
        try {
          const res = await fetch("http://localhost:4000/api/admin/verify", {
            headers: { Authorization: `Bearer ${token}` }
          });
          if (!res.ok) throw new Error();
        } catch {
          sessionStorage.removeItem("adminToken");
          window.location.href = "login.html";
          return;
        }
      })();

      const API_BASE_URL = "http://localhost:4000/api";
      const MAX_VISIBLE_PER_CELL = 3;

      const formatter = new Intl.NumberFormat("en-IN", {
        style: "currency",
        currency: "INR",
        maximumFractionDigits: 0
      });

      const monthNames = [
        "January", "February", "March", "April", "May", "June",
        "July", "August", "September", "October", "November", "December"
      ];

      let allBookings = [];
      let currentYear = new Date().getFullYear();
      let currentMonth = new Date().getMonth();
      let activeRoom = "all";

      const calGrid = document.getElementById("calGrid");
      const monthLabel = document.getElementById("monthLabel");
      const btnPrev = document.getElementById("btnPrev");
      const btnNext = document.getElementById("btnNext");
      const btnToday = document.getElementById("btnToday");
      const statsRow = document.getElementById("statsRow");
      const roomFilter = document.getElementById("roomFilter");
      const popupOverlay = document.getElementById("popupOverlay");
      const popupTitle = document.getElementById("popupTitle");
      const popupBody = document.getElementById("popupBody");
      const popupClose = document.getElementById("popupClose");

      function toDateStr(d) {
        return d.toISOString().slice(0, 10);
      }

      function parseDate(str) {
        const [y, m, d] = String(str).slice(0, 10).split("-").map(Number);
        return new Date(y, m - 1, d);
      }

      function statusClass(status) {
        return "status-" + String(status).toLowerCase().replace(/\s+/g, "-");
      }

      function escapeHtml(value) {
        return String(value)
          .replaceAll("&", "&amp;")
          .replaceAll("<", "&lt;")
          .replaceAll(">", "&gt;")
          .replaceAll('"', "&quot;")
          .replaceAll("'", "&#039;");
      }

      function normalizeBooking(b) {
        return {
          id: b.id,
          name: b.guest_name || b.name,
          phone: b.guest_phone || b.phone,
          checkIn: String(b.check_in || b.checkIn).slice(0, 10),
          checkOut: String(b.check_out || b.checkOut).slice(0, 10),
          guests: Number(b.guests),
          roomId: b.room_id || b.roomId,
          roomName: b.room_name || b.roomName,
          rooms: Number(b.rooms),
          nights: Number(b.nights),
          subtotal: Number(b.subtotal),
          tax: Number(b.tax),
          total: Number(b.total),
          status: b.status || "Confirmed"
        };
      }

      async function fetchBookings() {
        const now = new Date();
        const from = new Date(now.getFullYear() - 1, now.getMonth(), 1);
        const to = new Date(now.getFullYear() + 1, now.getMonth() + 1, 0);
        const url = `${API_BASE_URL}/bookings?from=${toDateStr(from)}&to=${toDateStr(to)}`;

        try {
          const res = await fetch(url);
          if (!res.ok) throw new Error("Failed to load bookings");
          const data = await res.json();
          allBookings = data.map(normalizeBooking);
        } catch (err) {
          console.error(err);
          const saved = localStorage.getItem("hotelVinayagamBookings");
          allBookings = saved ? JSON.parse(saved).map(normalizeBooking) : [];
          const errDiv = document.createElement("div");
          errDiv.className = "error-msg";
          errDiv.textContent = "Could not reach backend — showing cached bookings.";
          document.querySelector(".dash-container").insertBefore(errDiv, statsRow);
        }
      }

      function getFilteredBookings() {
        if (activeRoom === "all") return allBookings;
        return allBookings.filter(b => b.roomId === activeRoom);
      }

      function getBookingsForDate(dateStr) {
        return getFilteredBookings().filter(b => b.checkIn <= dateStr && b.checkOut > dateStr);
      }

      function renderStats() {
        const bookings = getFilteredBookings();
        const today = toDateStr(new Date());

        const confirmed = bookings.filter(b => b.status === "Confirmed").length;
        const checkedIn = bookings.filter(b => b.status === "Checked in").length;
        const cancelled = bookings.filter(b => b.status === "Cancelled").length;
        const todayBookings = getBookingsForDate(today).length;

        const totalRevenue = bookings
          .filter(b => b.status !== "Cancelled")
          .reduce((sum, b) => sum + b.total, 0);

        statsRow.innerHTML = `
          <div class="stat-card">
            <p class="stat-label">Today's Occupancy</p>
            <p class="stat-value">${todayBookings}</p>
          </div>
          <div class="stat-card">
            <p class="stat-label">Confirmed</p>
            <p class="stat-value">${confirmed}</p>
          </div>
          <div class="stat-card">
            <p class="stat-label">Checked In</p>
            <p class="stat-value">${checkedIn}</p>
          </div>
          <div class="stat-card">
            <p class="stat-label">Cancelled</p>
            <p class="stat-value">${cancelled}</p>
          </div>
          <div class="stat-card">
            <p class="stat-label">Revenue (excl. cancelled)</p>
            <p class="stat-value">${formatter.format(totalRevenue)}</p>
          </div>
        `;
      }

      function renderCalendar() {
        monthLabel.textContent = `${monthNames[currentMonth]} ${currentYear}`;

        const firstDay = new Date(currentYear, currentMonth, 1);
        const lastDay = new Date(currentYear, currentMonth + 1, 0);
        const startDow = firstDay.getDay();
        const daysInMonth = lastDay.getDate();

        const prevLast = new Date(currentYear, currentMonth, 0);
        const prevDays = prevLast.getDate();

        const today = toDateStr(new Date());
        let html = "";

        for (let i = 0; i < startDow; i++) {
          const day = prevDays - startDow + 1 + i;
          const d = new Date(currentYear, currentMonth - 1, day);
          const dateStr = toDateStr(d);
          const bookings = getBookingsForDate(dateStr);
          html += buildCell(day, dateStr, true, false, bookings);
        }

        for (let day = 1; day <= daysInMonth; day++) {
          const d = new Date(currentYear, currentMonth, day);
          const dateStr = toDateStr(d);
          const isToday = dateStr === today;
          const bookings = getBookingsForDate(dateStr);
          html += buildCell(day, dateStr, false, isToday, bookings);
        }

        const totalCells = startDow + daysInMonth;
        const remaining = (7 - (totalCells % 7)) % 7;
        for (let i = 1; i <= remaining; i++) {
          const d = new Date(currentYear, currentMonth + 1, i);
          const dateStr = toDateStr(d);
          const bookings = getBookingsForDate(dateStr);
          html += buildCell(i, dateStr, true, false, bookings);
        }

        calGrid.innerHTML = html;
      }

      function buildCell(day, dateStr, outside, isToday, bookings) {
        let cls = "cal-cell";
        if (outside) cls += " outside";
        if (isToday) cls += " today";

        let inner = `<span class="cal-day">${day}</span>`;

        const visible = bookings.slice(0, MAX_VISIBLE_PER_CELL);
        for (const b of visible) {
          inner += `<span class="cal-booking ${statusClass(b.status)}" title="${escapeHtml(b.name)} — ${b.roomName} (${b.status})">${escapeHtml(b.name)}</span>`;
        }

        if (bookings.length > MAX_VISIBLE_PER_CELL) {
          inner += `<span class="cal-more" data-date="${dateStr}">+${bookings.length - MAX_VISIBLE_PER_CELL} more</span>`;
        }

        return `<div class="${cls}" data-date="${dateStr}">${inner}</div>`;
      }

      const allStatuses = ["Confirmed", "Checked in", "Completed", "Cancelled"];

      function showDayPopup(dateStr) {
        popupOverlay.dataset.currentDate = dateStr;
        const bookings = getBookingsForDate(dateStr);
        const d = parseDate(dateStr);
        popupTitle.textContent = d.toLocaleDateString("en-IN", {
          weekday: "long", year: "numeric", month: "long", day: "numeric"
        });

        if (!bookings.length) {
          popupBody.innerHTML = `<p style="color:var(--muted);">No bookings on this date.</p>`;
        } else {
          popupBody.innerHTML = bookings.map(b => `
            <div class="popup-booking">
              <div class="popup-guest">
                <span class="cal-booking ${statusClass(b.status)}" style="display:inline-block;margin-right:6px;">${b.status}</span>
                ${escapeHtml(b.name)}
              </div>
              <div class="popup-meta">
                ${b.roomName} &middot; ${b.guests} guest${b.guests === 1 ? "" : "s"} &middot; ${b.checkIn} to ${b.checkOut} &middot; ${b.nights} night${b.nights === 1 ? "" : "s"} &middot; ${formatter.format(b.total)}
              </div>
              <div class="popup-actions">
                ${allStatuses.map(s => {
                  const isCurrent = s === b.status;
                  const cancelClass = s === "Cancelled" ? " status-cancelled-btn" : "";
                  return `<button type="button" data-status="${s}" data-id="${b.id}" class="${isCurrent ? "active-status" : ""}${cancelClass}" ${isCurrent ? "disabled" : ""}>${s}</button>`;
                }).join("")}
              </div>
            </div>
          `).join("");
        }

        popupOverlay.classList.add("open");
      }

      function clampMonth() {
        const now = new Date();
        const minDate = new Date(now.getFullYear() - 1, now.getMonth(), 1);
        const maxDate = new Date(now.getFullYear() + 1, now.getMonth(), 1);
        const cur = new Date(currentYear, currentMonth, 1);

        if (cur < minDate) {
          currentYear = minDate.getFullYear();
          currentMonth = minDate.getMonth();
        } else if (cur > maxDate) {
          currentYear = maxDate.getFullYear();
          currentMonth = maxDate.getMonth();
        }

        btnPrev.disabled = cur <= minDate;
        btnNext.disabled = cur >= maxDate;
      }

      function render() {
        clampMonth();
        renderStats();
        renderCalendar();
      }

      btnPrev.addEventListener("click", () => {
        currentMonth--;
        if (currentMonth < 0) { currentMonth = 11; currentYear--; }
        render();
      });

      btnNext.addEventListener("click", () => {
        currentMonth++;
        if (currentMonth > 11) { currentMonth = 0; currentYear++; }
        render();
      });

      btnToday.addEventListener("click", () => {
        const now = new Date();
        currentYear = now.getFullYear();
        currentMonth = now.getMonth();
        render();
      });

      roomFilter.addEventListener("click", (e) => {
        const btn = e.target.closest("[data-room]");
        if (!btn) return;
        activeRoom = btn.dataset.room;
        roomFilter.querySelectorAll("button").forEach(b => b.classList.remove("active"));
        btn.classList.add("active");
        render();
      });

      document.getElementById("btnLogout").addEventListener("click", async () => {
        const token = sessionStorage.getItem("adminToken");
        if (token) {
          try {
            await fetch(`${API_BASE_URL}/admin/logout`, {
              method: "POST",
              headers: { Authorization: `Bearer ${token}` }
            });
          } catch {}
        }
        sessionStorage.removeItem("adminToken");
        window.location.href = "login.html";
      });

      calGrid.addEventListener("click", (e) => {
        const cell = e.target.closest(".cal-cell[data-date]");
        if (!cell) return;
        showDayPopup(cell.dataset.date);
      });

      popupBody.addEventListener("click", async (e) => {
        const btn = e.target.closest(".popup-actions [data-status][data-id]");
        if (!btn || btn.disabled) return;

        const bookingId = btn.dataset.id;
        const newStatus = btn.dataset.status;
        const bookingDiv = btn.closest(".popup-booking");

        bookingDiv.querySelectorAll(".popup-actions button").forEach(b => b.disabled = true);

        try {
          const res = await fetch(`${API_BASE_URL}/bookings/${bookingId}/status`, {
            method: "PATCH",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ status: newStatus })
          });

          if (!res.ok) {
            const errorData = await res.json().catch(() => ({}));
            throw new Error(errorData.message || "Status update failed.");
          }

          const updated = normalizeBooking(await res.json());
          const idx = allBookings.findIndex(b => b.id === bookingId);
          if (idx !== -1) allBookings[idx] = updated;

          render();
          showDayPopup(popupOverlay.dataset.currentDate);
        } catch (err) {
          alert(err.message);
          bookingDiv.querySelectorAll(".popup-actions button").forEach(b => b.disabled = false);
        }
      });

      popupClose.addEventListener("click", () => popupOverlay.classList.remove("open"));
      popupOverlay.addEventListener("click", (e) => {
        if (e.target === popupOverlay) popupOverlay.classList.remove("open");
      });

      fetchBookings().then(render);
    </script>
  </body>
</html>
